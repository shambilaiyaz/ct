<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark futuristic background -->
  <rect width="100%" height="100%" fill="#0a0a1a" rx="16"/>

  <!-- Faint hex grid pattern -->
  <g opacity="0.06" stroke="#00e5ff" stroke-width="0.3" fill="none">
    <path d="M0,30 L20,20 L40,30 L40,50 L20,60 L0,50 Z"/>
    <path d="M40,30 L60,20 L80,30 L80,50 L60,60 L40,50 Z"/>
    <path d="M80,30 L100,20 L120,30 L120,50 L100,60 L80,50 Z"/>
    <path d="M120,30 L140,20 L160,30 L160,50 L140,60 L120,50 Z"/>
    <path d="M160,30 L180,20 L200,30 L200,50 L180,60 L160,50 Z"/>
    <path d="M20,60 L40,50 L60,60 L60,80 L40,90 L20,80 Z"/>
    <path d="M60,60 L80,50 L100,60 L100,80 L80,90 L60,80 Z"/>
    <path d="M100,60 L120,50 L140,60 L140,80 L120,90 L100,80 Z"/>
    <path d="M140,60 L160,50 L180,60 L180,80 L160,90 L140,80 Z"/>
    <path d="M0,90 L20,80 L40,90 L40,110 L20,120 L0,110 Z"/>
    <path d="M40,90 L60,80 L80,90 L80,110 L60,120 L40,110 Z"/>
    <path d="M80,90 L100,80 L120,90 L120,110 L100,120 L80,110 Z"/>
    <path d="M120,90 L140,80 L160,90 L160,110 L140,120 L120,110 Z"/>
    <path d="M160,90 L180,80 L200,90 L200,110 L180,120 L160,110 Z"/>
    <path d="M20,120 L40,110 L60,120 L60,140 L40,150 L20,140 Z"/>
    <path d="M60,120 L80,110 L100,120 L100,140 L80,150 L60,140 Z"/>
    <path d="M100,120 L120,110 L140,120 L140,140 L120,150 L100,140 Z"/>
    <path d="M140,120 L160,110 L180,120 L180,140 L160,150 L140,140 Z"/>
  </g>

  <!-- Scan lines -->
  <g opacity="0.04">
    <line x1="0" y1="10" x2="200" y2="10" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="25" x2="200" y2="25" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="200" y2="55" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="200" y2="70" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="85" x2="200" y2="85" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="115" x2="200" y2="115" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="130" x2="200" y2="130" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="145" x2="200" y2="145" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="175" x2="200" y2="175" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="190" x2="200" y2="190" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Stars scattered -->
  <circle cx="18" cy="22" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="55" cy="15" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="130" cy="12" r="1.3" fill="#fff" opacity="0.8"/>
  <circle cx="170" cy="25" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="185" cy="55" r="1.5" fill="#fff" opacity="0.85"/>
  <circle cx="25" cy="60" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="12" cy="105" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="42" cy="140" r="1.3" fill="#fff" opacity="0.75"/>
  <circle cx="175" cy="130" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="160" cy="165" r="1" fill="#fff" opacity="0.65"/>
  <circle cx="75" cy="170" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="110" cy="185" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="35" cy="30" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="40" r="0.8" fill="#fff" opacity="0.55"/>
  <circle cx="190" cy="95" r="1.2" fill="#fff" opacity="0.7"/>
  <!-- Twinkling stars (cross shape) -->
  <g transform="translate(70,30)" opacity="0.9">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#fff" stroke-width="0.8"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#fff" stroke-width="0.8"/>
  </g>
  <g transform="translate(145,75)" opacity="0.8">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.8"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#fff" stroke-width="0.8"/>
  </g>
  <g transform="translate(30,160)" opacity="0.85">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#fff" stroke-width="0.8"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#fff" stroke-width="0.8"/>
  </g>

  <!-- Moon -->
  <circle cx="100" cy="85" r="32" fill="#e0e0e0" opacity="0.15"/>
  <circle cx="100" cy="85" r="30" fill="#1a1a2e" stroke="#c0c0d0" stroke-width="1.5"/>
  <!-- Moon crescent shadow -->
  <circle cx="115" cy="78" r="26" fill="#0a0a1a"/>
  <!-- Moon surface details -->
  <circle cx="88" cy="78" r="3" fill="#1a1a30" opacity="0.4"/>
  <circle cx="95" cy="95" r="2" fill="#1a1a30" opacity="0.3"/>
  <circle cx="82" cy="90" r="1.5" fill="#1a1a30" opacity="0.35"/>
  <!-- Moon glow -->
  <circle cx="100" cy="85" r="35" fill="none" stroke="#c0c0d0" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="85" r="40" fill="none" stroke="#c0c0d0" stroke-width="0.3" opacity="0.15"/>

  <!-- Magic stick resting on moon -->
  <line x1="105" y1="78" x2="140" y2="50" stroke="#9e9e9e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stick detail lines -->
  <line x1="110" y1="74" x2="112" y2="72.5" stroke="#bdbdbd" stroke-width="0.5" opacity="0.6"/>
  <line x1="118" y1="67" x2="120" y2="65.5" stroke="#bdbdbd" stroke-width="0.5" opacity="0.6"/>
  <line x1="126" y1="60" x2="128" y2="58.5" stroke="#bdbdbd" stroke-width="0.5" opacity="0.6"/>

  <!-- Magic ball at stick end — outer glow -->
  <circle cx="140" cy="50" r="14" fill="#00e5ff" opacity="0.08"/>
  <circle cx="140" cy="50" r="11" fill="#00e5ff" opacity="0.12"/>
  <circle cx="140" cy="50" r="8" fill="#00e5ff" opacity="0.18"/>
  <!-- Magic ball — main -->
  <circle cx="140" cy="50" r="6" fill="#00e5ff" opacity="0.9"/>
  <!-- Magic ball — inner bright core -->
  <circle cx="140" cy="50" r="3" fill="#ffffff" opacity="0.8"/>
  <!-- Magic ball — shine spot -->
  <circle cx="138" cy="48" r="1.5" fill="#ffffff" opacity="0.9"/>
  <!-- Magic ball — pulse rings -->
  <circle cx="140" cy="50" r="10" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="140" cy="50" r="16" fill="none" stroke="#00e5ff" stroke-width="0.3" opacity="0.2"/>
  <circle cx="140" cy="50" r="22" fill="none" stroke="#00e5ff" stroke-width="0.2" opacity="0.1"/>

  <!-- Magic sparkles around the ball -->
  <g opacity="0.7">
    <circle cx="148" cy="40" r="1" fill="#00e5ff"/>
    <circle cx="155" cy="50" r="0.8" fill="#00e5ff" opacity="0.6"/>
    <circle cx="150" cy="58" r="0.7" fill="#00e5ff" opacity="0.5"/>
    <circle cx="132" cy="38" r="0.8" fill="#00e5ff" opacity="0.6"/>
    <circle cx="130" cy="55" r="0.7" fill="#00e5ff" opacity="0.4"/>
  </g>

  <!-- Cat paw print at bottom center -->
  <!-- Main pad -->
  <ellipse cx="100" cy="165" rx="12" ry="10" fill="#ff3c7f" opacity="0.9"/>
  <ellipse cx="100" cy="165" rx="12" ry="10" fill="none" stroke="#ff3c7f" stroke-width="0.5" opacity="0.5"/>
  <!-- Top-left toe pad -->
  <ellipse cx="85" cy="150" rx="6" ry="6.5" fill="#ff3c7f" opacity="0.9"/>
  <!-- Top-center toe pad -->
  <ellipse cx="98" cy="147" rx="6" ry="6.5" fill="#ff3c7f" opacity="0.9"/>
  <!-- Top-right toe pad -->
  <ellipse cx="112" cy="148" rx="6" ry="6.5" fill="#ff3c7f" opacity="0.9"/>
  <!-- Far-right toe pad -->
  <ellipse cx="122" cy="156" rx="5" ry="5.5" fill="#ff3c7f" opacity="0.85"/>
  <!-- Paw glow -->
  <ellipse cx="100" cy="165" rx="16" ry="14" fill="none" stroke="#ff3c7f" stroke-width="0.5" opacity="0.3"/>

</svg>
