<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Light green background -->
  <rect width="100%" height="100%" fill="#c8e6c9" rx="16"/>

  <!-- Shooting star — going left, blue -->
  <line x1="170" y1="15" x2="30" y2="35" stroke="#2196f3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="15" x2="140" y2="20" stroke="#bbdefb" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="170" cy="15" r="3" fill="#2196f3" opacity="0.9"/>
  <!-- Shooting star tail glow -->
  <line x1="170" y1="15" x2="100" y2="25" stroke="#2196f3" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>

  <!-- Small stars scattered -->
  <circle cx="25" cy="20" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="60" cy="12" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="90" cy="8" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="45" cy="30" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="180" cy="50" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="15" cy="55" r="1.2" fill="#fff" opacity="0.7"/>

  <!-- Open book — left page -->
  <path d="M60,140 L100,130 L100,165 L60,172 Z" fill="#fff9c4" stroke="#8d6e63" stroke-width="1"/>
  <!-- Open book — right page -->
  <path d="M100,130 L140,140 L140,172 L100,165 Z" fill="#fffde7" stroke="#8d6e63" stroke-width="1"/>
  <!-- Book spine -->
  <line x1="100" y1="130" x2="100" y2="165" stroke="#6d4c41" stroke-width="1.5"/>
  <!-- Left page lines -->
  <line x1="70" y1="144" x2="95" y2="138" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="70" y1="150" x2="95" y2="144" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="70" y1="156" x2="95" y2="150" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="70" y1="162" x2="95" y2="156" stroke="#bcaaa4" stroke-width="0.6" opacity="0.5"/>
  <!-- Right page lines -->
  <line x1="105" y1="138" x2="133" y2="144" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="105" y1="144" x2="133" y2="150" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="105" y1="150" x2="133" y2="156" stroke="#bcaaa4" stroke-width="0.6" opacity="0.6"/>
  <line x1="105" y1="156" x2="133" y2="162" stroke="#bcaaa4" stroke-width="0.6" opacity="0.5"/>
  <!-- Book cover thickness -->
  <path d="M60,172 L60,175 L140,175 L140,172" fill="#8d6e63" stroke="#6d4c41" stroke-width="0.5"/>

  <!-- Cat standing on the book -->
  <!-- Cat body -->
  <ellipse cx="100" cy="118" rx="14" ry="12" fill="#fdd835"/>
  <!-- Cat head -->
  <circle cx="100" cy="100" r="11" fill="#e0e0e0"/>
  <!-- Left ear -->
  <polygon points="92,92 89,78 96,90" fill="#9e9e9e"/>
  <polygon points="93,91 90,81 95,90" fill="#bdbdbd"/>
  <!-- Right ear -->
  <polygon points="108,92 111,78 104,90" fill="#9e9e9e"/>
  <polygon points="107,91 110,81 105,90" fill="#bdbdbd"/>
  <!-- Cat eyes -->
  <ellipse cx="95" cy="99" rx="2.5" ry="3" fill="#1a1a1a"/>
  <ellipse cx="105" cy="99" rx="2.5" ry="3" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="96" cy="98" r="0.8" fill="#fff" opacity="0.8"/>
  <circle cx="106" cy="98" r="0.8" fill="#fff" opacity="0.8"/>
  <!-- Cat nose -->
  <polygon points="100,102 98,104 102,104" fill="#ff5252"/>
  <!-- Cat mouth -->
  <line x1="100" y1="104" x2="100" y2="106" stroke="#bf360c" stroke-width="0.6"/>
  <path d="M97,106 Q100,108 103,106" fill="none" stroke="#bf360c" stroke-width="0.6"/>
  <!-- Cat whiskers -->
  <line x1="88" y1="102" x2="78" y2="100" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="88" y1="104" x2="78" y2="105" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="112" y1="102" x2="122" y2="100" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="112" y1="104" x2="122" y2="105" stroke="#bf360c" stroke-width="0.5"/>
  <!-- Cat tail -->
  <path d="M114,118 Q130,100 125,85" fill="none" stroke="#ff8c42" stroke-width="3" stroke-linecap="round"/>
  <!-- Tail tip -->
  <path d="M125,85 Q127,80 124,78" fill="none" stroke="#ffee58" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cat front legs -->
  <line x1="92" y1="128" x2="92" y2="138" stroke="#fdd835" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="128" x2="100" y2="138" stroke="#fdd835" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="92" cy="130" rx="4" ry="2.5" fill="#ffee58"/>
  <ellipse cx="100" cy="130" rx="4" ry="2.5" fill="#ffee58"/>
  <!-- Cat back legs (peeking behind body) -->
  <line x1="108" y1="126" x2="110" y2="133" stroke="#fdd835" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="110" cy="130" rx="3.5" ry="2.2" fill="#ffee58"/>

  <!-- ct text below book -->
  <text x="100" y="192" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32" text-anchor="middle" font-weight="bold">ct</text>

</svg>
