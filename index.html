<!doctype html>
<html lang="en">
    <!-- ct -->

    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width,
	initial-scale=1"
        />
        <title>Cat</title>
        <!-- connected -->
        <link rel="stylesheet" href="ct.css" />
        <script src="ct.js"></script>
        <script src="act-ct.js"></script>

    <body onload="Login()">

            <h1 id="cat">cats!</h1>

                    width="425"
                    alt="ct tree img"
                />

                <div id="note">
                    <form action="text">
                        <input placeholder="note somthing your looking..." />
                    </form>
                </div>
                <br />
                <span id="wild">wild cat!</span>
            </h2>
            <!-- link -->
            <a href="https://www.britannica.com/animal/cat"
                ><span id="history">cats history</span></a
            >
            <br />

            <button id="reader" onclick="playSound()">read for me</button>
            <h2 id="blue">
                cats like to be <span id="nit">clean</span> and act at their own
                style. <br />
                they like to discover about <em>wigly</em> things. <br />

                <!-- opti !-->

                <select id="opti" onchange="changeImage()">
                    <option id="rope" value="rope">rope</option>

                    <option id="bird" value="bird">feather</option>
                    <option id="laser" value="laser">laser</option>

            </h2>

                src="https://imgs.search.brave.com/MFR2dtplD4WReIGtOCbt0FSAQYT9WRp_ShFvOXDgTqA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMucGV4ZWxzLmNv/bS9waG90b3MvMTQw/NDU1NjIvcGV4ZWxz/LXBob3RvLTE0MDQ1/NTYyLmpwZWc_YXV0/bz1jb21wcmVzcyZj/cz10aW55c3JnYiZk/cHI9MSZ3PTUwMA"
                alt="rope"
                id="img_opti"
                width="380"
            />

            <!--researched line -->
            <h2 id="green">cats hate green</h2>
            <br />

            <h2 class="warning">remember</h2>

                don't try to surround your cat when their not happy
            </h2>

            <!-- link -->
            <a href="https://en.wikipedia.org/wiki/Wildlife"
